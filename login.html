<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Dashboard da Loja</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="supabase-config.js" defer></script>
    <style>
      :root {
        --bg: #101614;
        --panel: #17211e;
        --ink: #edf5f1;
        --muted: #a9b7b1;
        --line: #2a3934;
        --brand: #5ed0b3;
        --danger: #ff8b8b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
      }

      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 28px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--brand);
        font-size: 0.76rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 22px;
        font-size: 1.85rem;
        line-height: 1.1;
      }

      label {
        display: block;
        margin-top: 14px;
        color: var(--muted);
        font-weight: 800;
      }

      input {
        width: 100%;
        height: 44px;
        margin-top: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101614;
        color: var(--ink);
        padding: 0 12px;
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 44px;
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: #09231e;
        cursor: pointer;
        font: inherit;
        font-weight: 900;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .message {
        min-height: 20px;
        margin-top: 14px;
        color: var(--danger);
        font-size: 0.92rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Acesso restrito</p>
      <h1>Controle Palina</h1>

      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" placeholder="voce@email.com" />

      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Sua senha" />

      <button id="loginButton" type="button">Entrar</button>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        const config = window.SUPABASE_CONFIG || {};
        const message = document.querySelector("#message");
        const button = document.querySelector("#loginButton");

        if (!config.url || !config.anonKey || !window.supabase?.createClient) {
          message.textContent = "Supabase nao configurado.";
          button.disabled = true;
          return;
        }

        const client = window.supabase.createClient(config.url, config.anonKey);
        const { data } = await client.auth.getSession();
        if (data.session) window.location.href = "index.html";

        button.addEventListener("click", async () => {
          const email = document.querySelector("#email").value.trim();
          const password = document.querySelector("#password").value;
          message.textContent = "";
          button.disabled = true;
          button.textContent = "Entrando...";

          const { error } = await client.auth.signInWithPassword({ email, password });
          if (error) {
            message.textContent = "E-mail ou senha invalidos.";
            button.disabled = false;
            button.textContent = "Entrar";
            return;
          }

          window.location.href = "index.html";
        });
      });
    </script>
  </body>
</html>
