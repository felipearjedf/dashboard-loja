<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard da Loja</title>
  <link rel="stylesheet" href="styles.css?v=2" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    // 2. Trava de Segurança
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
      }
    }
    checkAuth();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="imported-data.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Gestao da loja</p>
        <h1>Dashboard operacional</h1>
      </div>
      <div class="actions">
        <button id="exportButton" class="button secondary" type="button">Exportar planilha</button>
        <button id="saveButton" class="button secondary" type="button">Salvar</button>
        <button id="themeToggleButton" class="button secondary" type="button">Dark mode</button>

        <button onclick="supabase.auth.signOut().then(() => { window.location.href='login.html' })" class="button"
          type="button"
          style="background: #ff0000 !important; color: white !important; border: none; cursor: pointer; padding: 10px 20px;">
          SAIR AGORA
        </button>

        <button id="nextYearTopButton" class="button" type="button">Proximo ano</button>
      </div>
    </header>

    <section class="summary">
    </section>
  </main>
</body>

</html>
