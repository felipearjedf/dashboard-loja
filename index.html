<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard da Loja</title>
  <link rel="stylesheet" href="styles.css?v=5" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // TRAVA: Só mostra o site se estiver logado
    async function validarAcesso() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.replace('login.html');
      }
    }
    validarAcesso();

    async function sair() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="imported-data.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Gestao da loja</p>
        <h1>Dashboard operacional</h1>
      </div>
      <div class="actions">
        <button id="exportButton" class="button secondary">Exportar</button>
        <button id="saveButton" class="button secondary">Salvar</button>
        <button id="themeToggleButton" class="button secondary">Tema</button>
        <button onclick="sair()" class="button"
          style="background:#ff4444; color:white; border:none; cursor:pointer;">Sair</button>
      </div>
    </header>

    <section class="summary">
      <article><span>Receita</span><strong id="incomeTotal">R$ 0,00</strong></article>
      <article><span>Gastos</span><strong id="expenseTotal">R$ 0,00</strong></article>
      <article><span>Resultado</span><strong id="profitTotal">R$ 0,00</strong></article>
    </section>

  </main>
</body>

</html>
