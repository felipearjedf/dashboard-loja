<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard da Loja</title>
  <link rel="stylesheet" href="styles.css?v=4" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    // Função para verificar se está logado antes de mostrar o conteúdo
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.replace('login.html');
      }
    }
    checkAuth();

    // Função de Logout Global
    async function handleLogout() {
      const { error } = await supabase.auth.signOut();
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = 'login.html';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="imported-data.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Gestao da loja</p>
        <h1>Dashboard operacional</h1>
      </div>
      <div class="actions">
        <button id="exportButton" class="button secondary" type="button">Exportar planilha</button>
        <button id="saveButton" class="button secondary" type="button">Salvar</button>
        <button id="themeToggleButton" class="button secondary" type="button">Dark mode</button>
        <button onclick="handleLogout()" class="button" type="button"
          style="background: #ff4444; color: white; border: none; cursor: pointer;">Sair</button>
        <button id="nextYearTopButton" class="button" type="button">Proximo ano</button>
      </div>
    </header>

    <p id="saveStatus" class="save-status">Salvamento automatico ativo</p>

    <section class="summary">
      <article><span>Receita do mes</span><strong id="incomeTotal">R$ 0,00</strong></article>
      <article><span>Gastos do mes</span><strong id="expenseTotal">R$ 0,00</strong></article>
      <article><span>Resultado</span><strong id="profitTotal">R$ 0,00</strong></article>
    </section>

    <details class="yearly-panel">
      <summary><span>Totais por ano</span><strong id="currentYearResult">R$ 0,00</strong></summary>
      <div class="yearly-table-wrap">
        <table class="yearly-table">
          <thead>
            <tr>
              <th>Ano</th>
              <th>Faturamento</th>
              <th>Gastos</th>
              <th>Resultado</th>
            </tr>
          </thead>
          <tbody id="yearlyTotalsBody"></tbody>
        </table>
      </div>
    </details>

    <section class="controls">
      <div class="segmented"><button class="segment active" data-ledger="income">Marketplaces</button><button
          class="segment" data-ledger="expense">Gastos</button></div>
      <div class="year-control">
        <button id="previousYearButton" class="icon-step">&lt;</button>
        <label><span>Ano</span><select id="yearSelect"></select></label>
        <button id="nextYearButton" class="icon-step">&gt;</button>
      </div>
    </section>

    <nav id="monthTabs" class="month-tabs"></nav>

    <section class="sheet-section">
      <div class="sheet-heading">
        <div>
          <p id="sheetType" class="eyebrow">Marketplaces</p>
          <h2 id="sheetTitle">Carregando...</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table id="dataTable"></table>
      </div>
    </section>
  </main>
</body>

</html>
